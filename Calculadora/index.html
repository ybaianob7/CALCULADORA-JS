<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> CALCULADORA DO HN</h1>

      <div class="calculadora">
<br><br><br><br><br>
    <input id="tela" readonly> 
    <br><br><br>
    <button onclick="somar('1')">1</button>
    <button onclick="somar('2')">2</button>
    <button onclick="somar('3')">3</button><br><br>
    <button onclick="somar('4')">4</button>
    <button onclick="somar('5')">5</button>
    <button onclick="somar('6')">6</button><br><br>
    <button onclick="somar('7')">7</button>
    <button onclick="somar('8')">8</button>
    <button onclick="somar('9')">9</button><br><br>
    <button onclick="somar('0')">0</button> <br>
    <br>
    <button onclick="somar('+')">+</button>
    <button onclick="somar('-')">-</button>
    <button onclick="somar('/')">/</button>
    <button onclick="somar('*')">*</button>
    <button onclick="calcular()">=</button>
    <button onclick="limpar()">C</button>

</div>
    



    <script src="script.js"></script>
</body>
</html>
